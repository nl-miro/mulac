# Gemini Code Assist Configuration

# Code customization and guidelines for this repository
# See the root AGENTS.md file for complete developer experience guidelines

conventions:
  commits:
    format: "conventional"
    reference: "AGENTS.md"

  llm_attribution:
    enabled: true
    trailer_format: "{toolname}::{model}::{effort}"
    reference: "AGENTS.md"

# Ignore patterns (optional)
ignore_patterns:
  - "target/"
  - "node_modules/"
  - ".git/"
  - "*.lock"

# Commands that can be run without confirmation
allowed_commands:
  - "git add *"
  - "git commit *"
  - "git status"
  - "git diff"
  - "git log *"

# Code review configuration
code_review:
  enabled: false
  style_guide: "AGENTS.md"
